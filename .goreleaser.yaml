# GoReleaser configuration.
# Docs: https://goreleaser.com  —  run `goreleaser check` to validate.
version: 2

project_name: elgato

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publish a Homebrew cask into the tap repo on every tagged release.
# (Homebrew now prefers casks over formulae for pre-built binaries; casks are
# macOS-only, which suits this tool.) Requires a Personal Access Token with
# contents:write on github.com/arventures/homebrew-elgato, as TAP_GITHUB_TOKEN.
homebrew_casks:
  - name: elgato
    binaries:
      - elgato
    repository:
      owner: arventures
      name: homebrew-elgato
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/arventures/elgato"
    description: "Control Elgato Key Lights from the command line"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    # The binary is not code-signed/notarized, so strip the quarantine flag on
    # install to avoid "elgato is damaged and can't be opened" from Gatekeeper.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/elgato"]
          end
